<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus · 6 IAs em Consenso</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#07090d; --surface:#0d1117; --border:#181f2a; --border-bright:#243040;
    --text:#b8cad8; --text-dim:#4a6070; --text-bright:#e4f0ff;
    --athena:#00c8ff; --prometheus:#ff6b35; --socrates:#7bff6b;
    --claude:#cc785c; --gemini:#4285f4; --oracle:#ffd700;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,255,.03) 1px, transparent 1px),linear-gradient(90deg, rgba(0,200,255,.03) 1px, transparent 1px);background-size:30px 30px;pointer-events:none;z-index:0}

  header{padding:30px 20px;border-bottom:1px solid var(--border);background:rgba(13,17,23,0.8);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100}
  .header-content{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
  h1{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--text-bright);letter-spacing:-1px}
  h1 span{color:var(--athena)}

  .api-keys-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;max-width:1200px;margin:20px auto;padding:0 20px}
  .key-box{background:var(--surface);border:1px solid var(--border);padding:12px;border-radius:4px}
  .key-box label{display:block;font-size:9px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px}
  .key-box input{width:100%;background:transparent;border:none;color:var(--athena);outline:none;font-family:'DM Mono';font-size:13px}

  main{max-width:1000px;margin:20px auto;padding:0 20px 100px;position:relative;z-index:1}
  .input-wrapper{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:25px;margin-bottom:40px;box-shadow:0 20px 50px rgba(0,0,0,0.4)}
  textarea{width:100%;background:transparent;border:none;color:var(--text-bright);font-family:'DM Mono';font-size:18px;resize:none;min-height:120px;outline:none;line-height:1.5}
  
  .footer-input{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
  .btn-run{background:var(--athena);color:#000;border:none;padding:15px 40px;font-family:'Syne';font-weight:800;text-transform:uppercase;cursor:pointer;border-radius:4px;transition:0.3s;letter-spacing:1px}
  .btn-run:hover{background:#5cdfff;transform:translateY(-2px);box-shadow:0 5px 15px rgba(0,200,255,0.3)}
  .btn-run:disabled{background:var(--border-bright);color:var(--text-dim);cursor:not-allowed;transform:none}

  .debate-arena{display:flex;flex-direction:column;gap:30px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:35px;position:relative;animation:cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards}
  .card-header{display:flex;align-items:center;gap:15px;margin-bottom:20px}
  .agent-dot{width:10px;height:10px;border-radius:50%;box-shadow:0 0 10px currentColor}
  .agent-title{font-family:'Syne';font-weight:700;text-transform:uppercase;letter-spacing:2px;font-size:12px}
  .card-body{line-height:1.8;font-size:15px;color:var(--text)}

  .thinking-box{display:flex;align-items:center;gap:12px;padding:20px;color:var(--text-dim);font-size:11px;letter-spacing:1px}
  .loader{display:flex;gap:4px}
  .loader-dot{width:3px;height:3px;background:currentColor;border-radius:50%;animation:blink 1.4s infinite both}
  .loader-dot:nth-child(2){animation-delay:0.2s}
  .loader-dot:nth-child(3){animation-delay:0.4s}

  @keyframes cardIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  @keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}

  .progress-bar-bg{width:200px;height:2px;background:var(--border);border-radius:1px;position:relative}
  #progressFill{height:100%;width:0%;background:var(--athena);transition:width 0.5s ease;box-shadow:0 0 10px var(--athena)}
</style>
</head>
<body>

<header>
  <div class="header-content">
    <h1>NEXUS <span>CONSENSO</span></h1>
    <div class="progress-bar-bg"><div id="progressFill"></div></div>
  </div>
</header>

<div class="api-keys-grid">
  <div class="key-box">
    <label>Anthropic API (Claude)</label>
    <input type="password" id="antKey" placeholder="sk-ant-...">
  </div>
  <div class="key-box">
    <label>Google Gemini API</label>
    <input type="password" id="gemKey" placeholder="AIzaSy...">
  </div>
</div>

<main>
  <div class="input-wrapper">
    <textarea id="questionInput" placeholder="Insira o dilema para as 6 IAs resolverem..."></textarea>
    <div class="footer-input">
      <div id="statusTxt" style="font-size:10px;color:var(--text-dim)">KERNEL IDLE</div>
      <button class="btn-run" id="btnAction" onclick="runNexus()">Iniciar Rodada</button>
    </div>
  </div>

  <div id="debateArena" class="debate-arena"></div>
</main>

<script>
const AGENTS = {
  athena: { name: 'Athena', color: 'var(--athena)', sys: 'Você é Athena. Foco em estratégia e lógica pura.' },
  prometheus: { name: 'Prometheus', color: 'var(--prometheus)', sys: 'Você é Prometheus. Foco em inovação e disrupção.' },
  socrates: { name: 'Socrates', color: 'var(--socrates)', sys: 'Você é Socrates. Foco em ética e questionamento socrático.' },
  claude: { name: 'Claude', color: 'var(--claude)', sys: 'Você é Claude. Foco em precisão técnica.' },
  gemini: { name: 'Gemini', color: 'var(--gemini)', sys: 'Você é Gemini. Foco em síntese de informações globais.' },
  oracle: { name: 'Oracle', color: 'var(--oracle)', sys: 'Você é o Oracle. Sintetize o debate em um consenso final.' }
};

async function callAPI(agentKey, history) {
  const isGemini = agentKey === 'gemini' || agentKey === 'prometheus';
  const endpoint = isGemini ? '/api/gemini' : '/api/anthropic';
  const apiKey = isGemini ? document.getElementById('gemKey').value : document.getElementById('antKey').value;
  
  if(!apiKey) throw new Error(`Chave para ${agentKey} não encontrada.`);

  const payload = isGemini ? {
    contents: [{ parts: [{ text: `${AGENTS[agentKey].sys}\n\nHistórico do debate:\n${history}` }] }]
  } : {
    model: "claude-3-haiku-20240307",
    max_tokens: 1024,
    system: AGENTS[agentKey].sys,
    messages: [{role: "user", content: `Debate atual:\n${history}`}]
  };

  const res = await fetch(endpoint, {
    method: 'POST',
    headers: { 
      'Content-Type': 'application/json',
      [isGemini ? 'x-goog-api-key' : 'x-api-key']: apiKey 
    },
    body: JSON.stringify(payload)
  });

  const data = await res.json();
  if(data.error) throw new Error(data.error.message || "Erro API");
  return isGemini ? data.candidates[0].content.parts[0].text : data.content[0].text;
}

function createCard(key, text) {
  const a = AGENTS[key];
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <div class="agent-dot" style="color:${a.color};background:${a.color}"></div>
      <span class="agent-title" style="color:${a.color}">${a.name}</span>
    </div>
    <div class="card-body">${text.replace(/\n/g, '<br>')}</div>
  `;
  document.getElementById('debateArena').appendChild(card);
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function showThinking(name) {
  const t = document.createElement('div');
  t.id = 'thinking';
  t.className = 'thinking-box';
  t.innerHTML = `<div class="loader"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div> <span>${name} está processando...</span>`;
  document.getElementById('debateArena').appendChild(t);
}

async function runNexus() {
  const q = document.getElementById('questionInput').value;
  const btn = document.getElementById('btnAction');
  const bar = document.getElementById('progressFill');
  if(!q) return;

  btn.disabled = true;
  document.getElementById('debateArena').innerHTML = '';
  let debateHistory = `Pergunta: ${q}\n`;

  try {
    const sequence = ['athena', 'prometheus', 'socrates', 'claude', 'gemini', 'oracle'];
    for(let i=0; i < sequence.length; i++) {
      const key = sequence[i];
      document.getElementById('statusTxt').innerText = `EXECUTANDO: ${AGENTS[key].name.toUpperCase()}`;
      showThinking(AGENTS[key].name);

      const response = await callAPI(key, debateHistory);
      
      document.getElementById('thinking').remove();
      debateHistory += `\n[${AGENTS[key].name}]: ${response}`;
      createCard(key, response);
      bar.style.width = `${((i+1)/6)*100}%`;
    }
    document.getElementById('statusTxt').innerText = `CONSENSO FINALIZADO`;
  } catch(e) {
    alert("ERRO: " + e.message);
    document.getElementById('statusTxt').innerText = `SISTEMA FALHOU`;
    if(document.getElementById('thinking')) document.getElementById('thinking').remove();
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
