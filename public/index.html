<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus · 6 IAs em Consenso</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#07090d; --surface:#0d1117; --border:#181f2a; --border-bright:#243040;
    --text:#b8cad8; --text-dim:#4a6070; --text-bright:#e4f0ff;
    --athena:#00c8ff; --prometheus:#ff6b35; --socrates:#7bff6b;
    --claude:#cc785c; --gemini:#4285f4; --oracle:#ffd700;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden}
  
  /* Background Grid Effect do Original */
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,255,.03) 1px, transparent 1px),linear-gradient(90deg, rgba(0,200,255,.03) 1px, transparent 1px);background-size:30px 30px;pointer-events:none;z-index:0}

  header{padding:40px 20px;border-bottom:1px solid var(--border);background:rgba(13,17,23,0.8);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100}
  .header-content{max-width:1000px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
  h1{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:var(--text-bright);letter-spacing:-1px}
  h1 span{color:var(--athena)}

  .setup-section{max-width:1000px;margin:20px auto;padding:0 20px;display:grid;grid-template-columns:1fr 1fr;gap:15px}
  .api-field{background:var(--surface);border:1px solid var(--border);padding:12px;border-radius:4px}
  .api-field label{display:block;font-size:9px;color:var(--text-dim);text-transform:uppercase;margin-bottom:5px}
  .api-field input{width:100%;background:transparent;border:none;color:var(--text-bright);outline:none;font-family:'DM Mono'}

  main{max-width:1000px;margin:20px auto;padding:0 20px 100px;position:relative;z-index:1}
  
  .input-area{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:25px;margin-bottom:40px;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
  textarea{width:100%;background:transparent;border:none;color:var(--text-bright);font-family:'DM Mono';font-size:18px;resize:none;min-height:120px;outline:none}
  
  .actions{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
  button{background:var(--athena);color:#000;border:none;padding:14px 35px;font-family:'Syne';font-weight:800;text-transform:uppercase;cursor:pointer;border-radius:4px;transition:0.3s}
  button:hover{background:#5cdfff;transform:scale(1.02)}
  button:disabled{background:var(--border-bright);color:var(--text-dim);cursor:wait}

  .debate-arena{display:flex;flex-direction:column;gap:25px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:30px;animation:slideIn 0.5s ease-out forwards}
  .card-header{display:flex;align-items:center;gap:15px;margin-bottom:20px}
  .agent-badge{width:12px;height:12px;border-radius:50%}
  .agent-name{font-family:'Syne';font-weight:700;text-transform:uppercase;letter-spacing:1px;font-size:13px}
  .content{line-height:1.8;font-size:15px;color:var(--text)}

  .thinking{display:flex;align-items:center;gap:10px;color:var(--text-dim);font-size:12px;margin-top:20px}
  .dot{width:4px;height:4px;background:currentColor;border-radius:50%;animation:pulse 1s infinite}

  @keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}

  .progress-container{width:150px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  #progressBar{height:100%;width:0%;background:var(--athena);transition:width 0.5s}
</style>
</head>
<body>

<header>
  <div class="header-content">
    <h1>NEXUS <span>AI</span></h1>
    <div class="progress-container"><div id="progressBar"></div></div>
  </div>
</header>

<div class="setup-section">
  <div class="api-field">
    <label>Anthropic API Key</label>
    <input type="password" id="keyAnt" placeholder="sk-ant-...">
  </div>
  <div class="api-field">
    <label>Google Gemini API Key</label>
    <input type="password" id="keyGem" placeholder="AIzaSy...">
  </div>
</div>

<main>
  <div class="input-area">
    <textarea id="questionInput" placeholder="Qual o desafio para o conselho de IAs?"></textarea>
    <div class="actions">
      <div id="statusLabel" style="font-size:11px;color:var(--text-dim)">SISTEMA PRONTO</div>
      <button id="btnStart" onclick="startNexus()">Iniciar Rodada de Consenso</button>
    </div>
  </div>

  <div id="debateArena" class="debate-arena"></div>
</main>

<script>
const AGENTS = {
  athena: { name: 'Athena', color: 'var(--athena)', sys: 'Você é Athena. Foco em estratégia, lógica pura e eficiência.' },
  prometheus: { name: 'Prometheus', color: 'var(--prometheus)', sys: 'Você é Prometheus. Foco em inovação, quebra de paradigmas e futuro.' },
  socrates: { name: 'Socrates', color: 'var(--socrates)', sys: 'Você é Socrates. Foco em ética, dialética e questionamentos profundos.' },
  claude: { name: 'Claude', color: 'var(--claude)', sys: 'Você é o Claude. Foco em análise técnica rigorosa e segurança.' },
  gemini: { name: 'Gemini', color: 'var(--gemini)', sys: 'Você é o Gemini. Foco em conexões de dados e visão multicultural.' },
  oracle: { name: 'Oracle', color: 'var(--oracle)', sys: 'Você é o Oracle. Seu objetivo é unir todos os pontos anteriores em um consenso final absoluto.' }
};

async function callProxy(api, system, user) {
  const isClaude = api === 'claude';
  const endpoint = isClaude ? '/api/anthropic' : '/api/gemini';
  const key = isClaude ? document.getElementById('keyAnt').value : document.getElementById('keyGem').value;
  
  if(!key) throw new Error(`Chave ${api.toUpperCase()} faltando.`);

  const body = isClaude ? {
    model: "claude-3-haiku-20240307",
    max_tokens: 1024,
    system: system,
    messages: [{role: "user", content: user}]
  } : {
    contents: [{ parts: [{ text: `${system}\n\nContexto do Debate:\n${user}` }] }]
  };

  const res = await fetch(endpoint, {
    method: 'POST',
    headers: { 
      'Content-Type': 'application/json',
      [isClaude ? 'x-api-key' : 'x-goog-api-key']: key 
    },
    body: JSON.stringify(body)
  });

  const data = await res.json();
  if(data.error) throw new Error(data.error.message || "Erro na API");
  
  return isClaude ? data.content[0].text : data.candidates[0].content.parts[0].text;
}

function addCard(key, text) {
  const agent = AGENTS[key];
  const arena = document.getElementById('debateArena');
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    <div class="card-header">
      <div class="agent-badge" style="background:${agent.color}"></div>
      <span class="agent-name" style="color:${agent.color}">${agent.name}</span>
    </div>
    <div class="content">${text.replace(/\n/g, '<br>')}</div>
  `;
  arena.appendChild(div);
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

async function startNexus() {
  const input = document.getElementById('questionInput');
  const btn = document.getElementById('btnStart');
  const bar = document.getElementById('progressBar');
  const status = document.getElementById('statusLabel');
  
  if(!input.value) return;
  
  btn.disabled = true;
  document.getElementById('debateArena').innerHTML = '';
  let history = [];
  
  try {
    const sequence = ['athena', 'prometheus', 'socrates', 'claude', 'gemini'];
    
    for(let i=0; i < sequence.length; i++) {
      const key = sequence[i];
      status.innerText = `IA PENSANDO: ${AGENTS[key].name.toUpperCase()}...`;
      
      const response = await callProxy(
        (key === 'gemini' ? 'gemini' : 'claude'), 
        AGENTS[key].sys, 
        `Pergunta: ${input.value}\n\nHistórico:\n${history.join('\n')}`
      );
      
      history.push(`[${AGENTS[key].name}]: ${response}`);
      addCard(key, response);
      bar.style.width = `${((i+1)/6)*100}%`;
    }

    // Oracle Final
    status.innerText = "GERANDO CONSENSO FINAL...";
    const final = await callProxy('claude', AGENTS.oracle.sys, `Resuma o debate: ${history.join('\n')}`);
    addCard('oracle', final);
    
    bar.style.width = '100%';
    status.innerText = "CONSENSO CONCLUÍDO";
  } catch(e) {
    alert(e.message);
    status.innerText = "ERRO NO PROCESSO";
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
