<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus · 6 IAs em Consenso</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#07090d; --surface:#0d1117; --border:#181f2a; --border-bright:#243040;
    --text:#b8cad8; --text-dim:#4a6070; --text-bright:#e4f0ff;
    --athena:#00c8ff; --prometheus:#ff6b35; --socrates:#7bff6b;
    --claude:#cc785c; --gemini:#4285f4; --oracle:#ffd700;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden}
  
  /* Interface Header */
  header{padding:40px 20px;border-bottom:1px solid var(--border);background:rgba(13,17,23,0.8);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100}
  .header-content{max-width:1000px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
  h1{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:var(--text-bright);letter-spacing:-1px;display:flex;align-items:center;gap:12px}
  h1 span{color:var(--athena)}

  /* Setup Section */
  .setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1000px;margin:20px auto;padding:0 20px}
  .key-input{background:var(--surface);border:1px solid var(--border);padding:15px;border-radius:4px}
  .key-input label{display:block;font-size:10px;text-transform:uppercase;margin-bottom:8px;color:var(--text-dim)}
  .key-input input{width:100%;background:transparent;border:none;color:var(--athena);font-family:'DM Mono';outline:none}

  /* Main Arena */
  main{max-width:1000px;margin:40px auto;padding:0 20px 100px}
  .input-group{position:relative;margin-bottom:40px}
  textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:25px;color:var(--text-bright);font-family:'DM Mono';font-size:16px;resize:none;min-height:150px;transition:border-color 0.3s}
  textarea:focus{border-color:var(--athena);outline:none}

  .controls{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
  button{background:var(--athena);color:#000;border:none;padding:15px 40px;font-family:'Syne';font-weight:700;text-transform:uppercase;cursor:pointer;border-radius:4px;transition:transform 0.2s, background 0.2s}
  button:hover{transform:translateY(-2px);background:#5cdfff}
  button:disabled{background:var(--border-bright);color:var(--text-dim);cursor:not-allowed}

  /* Debate Cards */
  .debate-arena{display:flex;flex-direction:column;gap:20px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:25px;position:relative;animation:fadeIn 0.5s ease forwards}
  .card-header{display:flex;align-items:center;gap:15px;margin-bottom:15px;border-bottom:1px solid var(--border);padding-bottom:10px}
  .agent-name{font-family:'Syne';font-weight:700;text-transform:uppercase;font-size:14px}
  .card-content{line-height:1.6;font-size:14px}

  /* Progress Bar */
  .progress-wrap{width:200px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  #progressBar{height:100%;width:0%;background:var(--athena);transition:width 0.4s}

  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header>
  <div class="header-content">
    <h1>NEXUS <span>AI</span></h1>
    <div class="progress-wrap"><div id="progressBar"></div></div>
  </div>
</header>

<div class="setup-grid">
  <div class="key-input">
    <label>Anthropic API Key (Claude)</label>
    <input type="password" id="keyAnthropic" placeholder="sk-ant-...">
  </div>
  <div class="key-input">
    <label>Google Gemini API Key</label>
    <input type="password" id="keyGemini" placeholder="AIzaSy...">
  </div>
</div>

<main>
  <div class="input-group">
    <textarea id="questionInput" placeholder="Qual o problema técnico ou filosófico que as 6 IAs devem resolver hoje?"></textarea>
    <div class="controls">
      <span id="statusLabel" style="font-size:12px;color:var(--text-dim)">AGUARDANDO ENTRADA</span>
      <button id="btnStart" onclick="runNexus()">Iniciar Consenso</button>
    </div>
  </div>

  <div id="debateArena" class="debate-arena">
    </div>
</main>

<script>
// CONFIGURAÇÃO DOS AGENTES (Exatamente como o original)
const AGENTS = {
  athena: { name: 'Athena', color: 'var(--athena)', system: 'Você é Athena, estrategista focada em lógica e eficiência.' },
  prometheus: { name: 'Prometheus', color: 'var(--prometheus)', system: 'Você é Prometheus, focado em inovação radical.' },
  socrates: { name: 'Socrates', color: 'var(--socrates)', system: 'Você é Socrates, focado em ética e questionamento crítico.' },
  claude: { name: 'Claude', color: 'var(--claude)', system: 'Você é Claude, focado em precisão técnica e segurança.' },
  gemini: { name: 'Gemini', color: 'var(--gemini)', system: 'Você é Gemini, focado em amplitude de dados e conexões.' },
  oracle: { name: 'Oracle', color: 'var(--oracle)', system: 'Sua função é sintetizar o debate em um consenso final.' }
};

async function callAnthropic(system, user) {
  const resp = await fetch('/api/anthropic', { // ROTA DO SEU SERVIDOR NODE
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': document.getElementById('keyAnthropic').value
    },
    body: JSON.stringify({
      model: "claude-3-haiku-20240307",
      max_tokens: 1024,
      system: system,
      messages: [{role: "user", content: user}]
    })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message || "Erro Anthropic");
  return data.content[0].text;
}

async function callGemini(system, user) {
  const resp = await fetch('/api/gemini', { // ROTA DO SEU SERVIDOR NODE
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-goog-api-key': document.getElementById('keyGemini').value
    },
    body: JSON.stringify({
      contents: [{ parts: [{ text: system + "\n\n" + user }] }]
    })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message || "Erro Gemini");
  return data.candidates[0].content.parts[0].text;
}

function appendCard(agentKey, text) {
  const agent = AGENTS[agentKey];
  const arena = document.getElementById('debateArena');
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <span style="color:${agent.color}">●</span>
      <span class="agent-name" style="color:${agent.color}">${agent.name}</span>
    </div>
    <div class="card-content">${text.replace(/\n/g, '<br>')}</div>
  `;
  arena.appendChild(card);
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

async function runNexus() {
  const question = document.getElementById('questionInput').value;
  if (!question) return alert("Digite uma pergunta.");

  const btn = document.getElementById('btnStart');
  const bar = document.getElementById('progressBar');
  const arena = document.getElementById('debateArena');
  
  btn.disabled = true;
  arena.innerHTML = '';
  let history = [];

  try {
    const sequence = ['athena', 'prometheus', 'socrates', 'claude', 'gemini'];
    let step = 0;

    for (const key of sequence) {
      document.getElementById('statusLabel').innerText = `PROCESSANDO: ${AGENTS[key].name}`;
      
      let context = `Pergunta original: ${question}\n\nDebate anterior:\n${history.join('\n')}`;
      let response;

      // Decide qual IA chamar (Baseado no nome do agente ou modelo desejado)
      if (key === 'claude' || key === 'athena' || key === 'socrates') {
        response = await callAnthropic(AGENTS[key].system, context);
      } else {
        response = await callGemini(AGENTS[key].system, context);
      }

      history.push(`[${AGENTS[key].name}]: ${response}`);
      appendCard(key, response);
      
      step++;
      bar.style.width = (step / 6 * 100) + '%';
    }

    // Oracle (O Consenso Final)
    document.getElementById('statusLabel').innerText = `SINTETIZANDO CONCURSO: ORACLE`;
    const oracleContext = `Pergunta: ${question}\n\nDebate Completo:\n${history.join('\n')}\n\nPor favor, forneça o consenso final.`;
    const finalResult = await callAnthropic(AGENTS.oracle.system, oracleContext);
    
    appendCard('oracle', finalResult);
    bar.style.width = '100%';
    document.getElementById('statusLabel').innerText = `CONSENSO ATINGIDO`;

  } catch (err) {
    alert("Erro na execução: " + err.message);
    document.getElementById('statusLabel').innerText = `ERRO NA OPERAÇÃO`;
  } finally {
    btn.disabled = false;
  }
}
</script>

</body>
</html>
